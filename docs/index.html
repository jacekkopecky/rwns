<!doctype html>

<head>
  <meta charset="utf8" />
  <title>RWNS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <script type="module" crossorigin src="/rwns/assets/index-DGzGQvX3.js"></script>
  <link rel="stylesheet" crossorigin href="/rwns/assets/index-DvW409SQ.css">
<link rel="manifest" href="/rwns/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/rwns/registerSW.js"></script></head>

<body class="using-fullscreen">
  <header>
    <!-- splash screen -->
    <h1>RWNS <img src="/rwns/assets/explosion-BrJVmXi7.svg" /></h1>
    <button id="startBtn">Start</button>
    <p>Made with <a href="https://threejs.org/">Three.js</a>.</p>
    <p>Tested in portrait view, mostly on mobile.</p>
    <h4>It's playable but basic…</h4>
    <p id="version" class="hidden hiddenGone">Version: <span class="value">loading</span></p>
  </header>

  <main>
    <section id="mainScreen">
      <canvas id="webglCanvas" class="in-run"></canvas>

      <div id="log" class="in-run"></div>

      <div id="topBar" class="partial-in-run">
        <button id="exitBtn" class="in-run">Exit</button>
        <div class="wallet">
          <div class="coin neverHidden"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
          <div class="card hiddenGone">
            <span class="value">0</span> <i class="i cards-icon"></i>
          </div>
        </div>
        <button id="settingsBtn">⚙️</button>
      </div>

      <div id="runInfo" class="only-in-run">
        Lvl <span class="level"></span>, Rate <span class="rate"></span>, Dmg
        <span class="damage"></span>
      </div>

      <div id="playStats">
        <div class="level">Level <span class="value"></span></div>
        <div class="played">Played <span class="value"></span></div>
        <div class="energy hidden">Energy <span class="value"></span><i class="i energy"></i></div>
      </div>

      <div id="touchToStart">
        <span id="shortMessage" class="hiddenGone"></span>
        <span class="if-energy">touch to start</span>
        <span class="if-no-energy">out of energy</span>
      </div>

      <div id="inRunWallet" class="only-in-run">
        <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
        <div class="card hiddenGone"><span class="value">0</span> <i class="i cards-icon"></i></div>
      </div>

      <div id="endRunScreen">
        <div class="wallet">
          <div class="coin neverHidden"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
          <div class="card hiddenGone">
            <span class="value">0</span> <i class="i cards-icon"></i>
          </div>
        </div>
        <h2 class="if-win">Well done!</h2>
        <h2 class="if-not-win">Better luck next time!</h2>
        <div class="collected">
          <div>Collected</div>
          <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
          <div class="if-got-gems">
            <span class="gem neverHidden"><span class="value"></span></span>
            out of
            <span class="gemCount hiddenGone">
              <span class="value"></span> <i class="i gem"></i>
            </span>
          </div>
        </div>
        <div class="buttons">
          <button class="retry">
            <span class="if-win">Play again</span>
            <span class="if-not-win">Play again</span>
          </button>
          <button class="progress if-win">Next level</button>
        </div>
      </div>

      <div class="sectionButtons">
        <button class="cards">
          <i class="i cards-icon"></i>
        </button>
      </div>

      <div class="upgradeButtons">
        <button class="players">
          <span>Add player</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="rate">
          <span>Fire rate</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="damage">
          <span>Damage</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
      </div>
    </section>

    <section id="cards" class="inactive">
      <div class="wallet">
        <div class="coin hiddenGone"><span class="value">0</span> <i class="i coins"></i></div>
        <div class="gem neverHidden"><span class="value">0</span> <i class="i gem"></i></div>
        <div class="card hiddenGone"><span class="value">0</span> <i class="i cards-icon"></i></div>
      </div>
      <div class="cardsContainer">
        <div class="theCards"></div>
        <div class="if-empty">Your cards will be here.</div>
      </div>
      <div class="sectionButtons">
        <button class="close"><span>╳</span></button>
      </div>
      <div class="upgradeButtons">
        <button class="buyOne">
          <div><span class="amount">1</span> card</div>
          <div>
            <span class="cost gem">5</span> <i class="i cards-icon"></i><i class="i gem"></i>
          </div>
        </button>
        <button class="buyBulk hidden hiddenGone">
          <div><span class="amount">9</span> cards</div>
          <div>
            <span class="cost gem">42</span> <i class="i cards-icon"></i><i class="i gem"></i>
          </div>
        </button>
      </div>
    </section>

    <section id="dailyGift" class="inactive">
      <h2 class="colorText">
        <span>D</span>
        <span>a</span>
        <span>i</span>
        <span>l</span>
        <span>y </span>
        <span>G</span>
        <span>i</span>
        <span>f</span>
        <span>t</span>
      </h2>
      <div class="outer">
        <div class="spinner"></div>
      </div>
    </section>
  </main>

</body>
