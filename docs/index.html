<!doctype html>

<head>
  <meta charset="utf8" />
  <title>RWNS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <script type="module" crossorigin src="/rwns/assets/index-BdX2bm5L.js"></script>
  <link rel="stylesheet" crossorigin href="/rwns/assets/index-MaxB3G0t.css">
<link rel="manifest" href="/rwns/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/rwns/registerSW.js"></script></head>

<body class="using-fullscreen">
  <header>
    <h1>RWNS <img src="/rwns/assets/explosion-BrJVmXi7.svg"></h1>
    <button id="startBtn">Start</button>
    <p>Made with <a href="https://threejs.org/">Three.js</a>.</p>
    <p>Works only on mobile for now.</p>
    <h4>Not really playable yet…</h4>
  </header>

  <main>
    <section id="mainScreen">
      <canvas id="webglCanvas" class="in-run"></canvas>

      <div id="log" class="in-run"></div>

      <div id="topBar" class="partial-in-run">
        <button id="exitBtn" class="in-run">Exit</button>
        <div id="mainScreenWallet">
          <div class="coin hiddenGone"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
        </div>
        <button id="settingsBtn">⚙️</button>
      </div>

      <div id="playStats">
        <div class="level">Level <span class="value"></span></div>
        <div class="played">Played <span class="value"></span></div>
        <div class="energy hidden">Energy <span class="value"></span></div>
      </div>

      <div id="touchToStart">
        <span id="shortMessage" class="hiddenGone"></span>
        <span class="if-energy">touch to start</span>
        <span class="if-no-energy">out of energy</span>
      </div>

      <div id="inRunWallet" class="only-in-run">
        <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
      </div>

      <div id="endRunScreen">
        <h2 class="if-win">Well done!</h2>
        <h2 class="if-not-win">Better luck next time!</h2>
        <div class="collected">Collected</div>
        <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
        <div class="buttons">
          <button class="retry"><span class="if-win">Retry</span><span class="if-not-win">OK</span></button>
          <button class="ok if-win">Next</button>
        </div>
      </div>

      <div id="upgradeButtons">
        <button class="player">
          <span>Add player</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="rate">
          <span>Fire rate</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="damage">
          <span>Damage</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
      </div>
    </section>
  </main>

</body>
