<!doctype html>
<html lang="en">
  <head>
    <title>three.js webgl - svg loader</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="stylesheet" href="./assets/css/images.css" />
  </head>

  <body>
    <main>
      <section id="run" class="inactive no-inert">
        <canvas id="webglCanvas"></canvas>

        <div id="log" class="in-run"></div>

        <div class="topBar">
          <button id="quitBtn"><i class="i cross"></i></button>
          <div id="runInfo">
            Lvl <span class="level"></span
            ><span class="rate hiddenGone">, Rate <span class="value"></span></span
            ><span class="damage hiddenGone">, Dmg <span class="value"></span></span>
          </div>
          <!-- button repeated for symmetry -->
          <button style="visibility: hidden"><i class="i cross"></i></button>
        </div>

        <div id="inRunWallet">
          <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
          <div class="card hiddenGone">
            <span class="value">0</span> <i class="i cards-icon"></i>
          </div>
        </div>

        <div id="endRunScreen">
          <div class="topBar">
            <!-- button repeated for consistency -->
            <button style="visibility: hidden"><i class="i cross"></i></button>
          </div>
          <h2 class="if-win">Well done!</h2>
          <h2 class="if-not-win">Better luck next time!</h2>
          <div class="collected">
            <div>Collected</div>
            <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
            <div class="if-got-gems">
              <span class="gem neverHidden"><span class="value"></span></span>
              out of
              <span class="gemCount hiddenGone">
                <span class="value"></span> <i class="i gem"></i>
              </span>
            </div>
          </div>
          <div class="buttons">
            <button class="retry">
              <span class="if-win">Play again</span>
              <span class="if-not-win">Play again</span>
            </button>
            <button class="progress if-win">Next level</button>
          </div>
        </div>
      </section>

      <section id="mainScreen" style="display: none">
        <div class="topBar">
          <button id="exitBtn"><i class="i cross"></i></button>
          <button id="settingsBtn">⚙️</button>
        </div>

        <div class="playStats">
          <div class="level">Level <span class="value"></span></div>
          <div class="played">Played <span class="value"></span></div>
          <div class="energy hidden">
            Energy&nbsp;<span class="value"></span><span class="nextTime"></span
            ><i class="i energy"></i>
          </div>
        </div>

        <div class="sectionButtons left">
          <button class="cards">
            <i class="i cards-icon"></i>
          </button>
        </div>

        <div class="sectionButtons right">
          <button class="backToBasics"><span>B</span></button>
        </div>

        <div class="upgradeButtons">
          <button class="players">
            <span>Add player</span>
            <div class="level"><span class="value">0</span></div>
            <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
          </button>
          <button class="rate">
            <span>Fire rate</span>
            <div class="level"><span class="value">0</span></div>
            <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
          </button>
          <button class="damage">
            <span>Damage</span>
            <div class="level"><span class="value">0</span></div>
            <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
          </button>
        </div>
      </section>

      <section id="backToBasics" class="inactive" style="display: none">
        <div class="topBar">
          <button class="close"><i class="i cross"></i></button>
        </div>

        <div class="playStats">
          <div class="played">Played <span class="value">0</span></div>
        </div>
      </section>

      <aside id="mainWallet" style="display: none">
        <div class="wallet">
          <div class="coin neverHidden"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
          <div class="card hiddenGone">
            <span class="value">0</span> <i class="i cards-icon"></i>
          </div>
        </div>
      </aside>

      <aside id="touchToStart" style="display: none">
        <span id="shortMessage" class="hiddenGone"></span>
        <span class="if-energy">touch to start</span>
        <span class="if-no-energy">out of energy</span>
      </aside>

      <section id="cards" class="inactive" style="display: none">
        <div class="topBar">
          <button class="close"><i class="i cross"></i></button>
          <div class="wallet">
            <div class="coin hiddenGone"><span class="value">0</span> <i class="i coins"></i></div>
            <div class="gem neverHidden"><span class="value">0</span> <i class="i gem"></i></div>
            <div class="card hiddenGone">
              <span class="value">0</span> <i class="i cards-icon"></i>
            </div>
          </div>
          <!-- button repeated for symmetry -->
          <button style="visibility: hidden"><i class="i cross"></i></button>
        </div>

        <div class="cardsContainer">
          <div class="theCards"></div>
          <div class="if-empty">Your cards will be here.</div>
        </div>
        <div class="upgradeButtons">
          <button class="buyOne">
            <div><span class="amount">1</span> card</div>
            <div>
              <span class="cost gem">5</span> <i class="i cards-icon"></i><i class="i gem"></i>
            </div>
          </button>
          <button class="buyBulk hidden hiddenGone">
            <div><span class="amount">9</span> cards</div>
            <div>
              <span class="cost gem">42</span> <i class="i cards-icon"></i><i class="i gem"></i>
            </div>
          </button>
        </div>
      </section>

      <section id="dailyGift" class="inactive" style="display: none">
        <h2 class="colorText">
          <span>D</span>
          <span>a</span>
          <span>i</span>
          <span>l</span>
          <span>y </span>
          <span>G</span>
          <span>i</span>
          <span>f</span>
          <span>t</span>
        </h2>
        <div class="outer">
          <div class="spinner"></div>
        </div>
      </section>

      <section id="settings" class="inactive" style="display: none">
        <div class="topBar">
          <button class="closeBtn"><i class="i cross"></i></button>
          <h2>Settings</h2>
          <!-- button repeated for symmetry -->
          <button style="visibility: hidden"><i class="i cross"></i></button>
        </div>

        <div class="startInfo">Started playing: <span class="startDate">-</span></div>
        <details class="state">
          <summary>State (for debugging)</summary>
          <pre class="stateJson"></pre>
        </details>
        <button class="resetProgressBtn">Start from scratch</button>
      </section>
    </main>

    <script>
      window.testingMode = true;
    </script>
    <script type="module" src="./src/testing/test-track.ts"></script>
  </body>
</html>
