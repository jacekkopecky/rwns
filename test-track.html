<!doctype html>
<html lang="en">

<head>
  <title>three.js webgl - svg loader</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="images.css" />
</head>

<body>
  <main class="run">
    <section id="mainScreen">
      <canvas id="webglCanvas" class="in-run"></canvas>
      <div id="log" class="in-run"></div>

      <div id="topBar" class="partial-in-run">
        <button id="exitBtn" class="in-run">Exit</button>
        <div class="wallet">
          <div class="coin neverHidden"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
        </div>
        <button id="settingsBtn">⚙️</button>
      </div>

      <div id="playStats">
        <div class="level">Level <span class="value"></span></div>
        <div class="played">Played <span class="value"></span></div>
        <div class="energy hidden">Energy <span class="value"></span></div>
      </div>

      <div id="touchToStart">
        <span id="shortMessage" class="hiddenGone"></span>
        <span class="if-energy">touch to start</span>
        <span class="if-no-energy">out of energy</span>
      </div>

      <div id="inRunWallet" class="only-in-run">
        <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
      </div>

      <div id="endRunScreen">
        <div class="wallet">
          <div class="coin neverHidden"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem hiddenGone"><span class="value">0</span> <i class="i gem"></i></div>
        </div>
        <h2 class="if-win">Well done!</h2>
        <h2 class="if-not-win">Better luck next time!</h2>
        <div class="collected">
          <div>Collected</div>
          <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
          <div class="if-got-gems">
            <span class="gem neverHidden"><span class="value"></span></span>
            out of
            <span class="gemCount hiddenGone"><span class="value"></span> <i class="i gem"></i></span>
          </div>
        </div>
        <div class="buttons">
          <button class="retry">
            <span class="if-win">Replay</span>
            <span class="if-not-win">OK</span>
          </button>
          <button class="ok if-win">Next level</button>
        </div>
      </div>

      <div class="sectionButtons">
        <button class="cards">
          <!-- 2 background cards and one main card, rotated in CSS -->
          <div class="card back behind"></div>
          <div class="card back behind"></div>
          <div class="card back"></div>
        </button>
      </div>

      <div class="upgradeButtons">
        <button class="players">
          <span>Add player</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="rate">
          <span>Fire rate</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
        <button class="damage">
          <span>Damage</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </button>
      </div>
    </section>
  </main>

  <script> window.testingMode = true </script>
  <script type="module" src="./src/testing/test-track.ts"></script>

</body>

</html>
